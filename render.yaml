# Render Blueprint — деплойи худкор.
# Дар Render: New + → Blueprint → репозиторийро интихоб кунед → Apply.
#
# Базаи маълумот: PostgreSQL (доимӣ). Агар базаро аллакай дар Render сохта бошед,
# DATABASE_URL-ро дар дашборд (Environment) ба "Internal Database URL"-и он гузоред
# (envVar-и поён `sync: false` аст — яъне Render онро аз шумо мепурсад).

services:
  - type: web
    name: backend-insta
    runtime: node
    plan: free
    region: oregon             # ҳамон региони базаатон (Postgres шумо дар Oregon аст)
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        sync: false            # дар дашборд Internal Database URL-ро гузоред
      - key: JWT_SECRET
        generateValue: true    # Render худаш secret-и тасодуфӣ месозад
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CLIENT_ORIGIN
        value: "*"             # баъдтар ба домени фронтенди худ маҳдуд кунед
      - key: MAX_UPLOAD_MB
        value: "15"
      - key: VOICE_MAX_SECONDS
        value: "60"

    # Эзоҳ: файлҳои боршуда (аватар/овоз) дар диски эфемерии free нигоҳ дошта мешаванд
    # ва баъди redeploy нав мешаванд. Барои доимӣ — плани starter + disk илова кунед
    # ва UPLOAD_DIR=/var/data/uploads гузоред. (Маълумоти асосӣ дар Postgres доимист.)
